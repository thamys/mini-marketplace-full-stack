services:
  - type: web
    name: marketplace-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: "npm install --include=dev && npm run build"
    startCommand: "npx prisma migrate deploy && npx prisma db seed && npm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString
      - key: NODE_ENV
        value: production

  - type: web
    name: marketplace-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: "npm install --include=dev && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: marketplace-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_ENV
        value: production

databases:
  - name: marketplace-db
    plan: free
    databaseName: marketplace
    user: user
