services:
  - type: web
    name: marketplace-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: "npm install -g pnpm && pnpm config set side-effects-cache false && pnpm install && pnpm run build"
    startCommand: "npx prisma migrate deploy && npx prisma db seed && pnpm run start:prod"
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: marketplace-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: "npm install -g pnpm && pnpm install && pnpm run build"
    startCommand: "pnpm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: marketplace-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_ENV
        value: production

databases:
  - name: marketplace-db
    plan: free
    databaseName: marketplace
    user: user
